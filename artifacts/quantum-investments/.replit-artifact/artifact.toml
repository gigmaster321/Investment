kind = "web"
previewPath = "/"
title = "Quantum Investments"
version = "1.0.0"
id = "artifacts/quantum-investments"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/quantum-investments run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quantum-investments", "run", "build" ]
serve = "static"
publicDir = "artifacts/quantum-investments/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
